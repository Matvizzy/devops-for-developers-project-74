services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: make dev
    volumes:
      - ./app:/app
    ports:
      - "8080:8080"

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config: