services: 
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      DATABASE_NAME: app
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432

  test:
    build:
      context: .
      dockerfile: Dockerfile.production
    depends_on:
      - db
    environment:
      DATABASE_NAME: app
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
    command: make test